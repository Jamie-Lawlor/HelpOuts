{% extends "base.html" %} {% block title %}Login{% endblock %} {% block navbar
%}{% endblock %} {% block body %}

<div class="login-page-container">
  <div class="login-container">
    <div class="login-side-image">
      <img src="/static/images/MFA_icon.png" alt="Helpouts logo" />
    </div>

    <div class="login-form-card">
      <div class="login-card-content">
        <div class="header mb-4">
          <div class="text-center">
            <img
              src="/static/images/templogo6.png"
              alt="Helpouts logo"
              class="login-logo"
            />
          </div>
          <p class="text-muted text-center">
            Enter OTP Sent To Your Email.
          </p>
        </div>

        <form method="POST">
          <div class="mb-3 mt-3">
            <div class="form-group mb-4">
              {% if error%}
              <p class="error">{{ error }}</p>
              {% endif %}
              <input type="text"
                name="otp"
                class="form-control soft-input"
                placeholder="OTP"
                aria-label="otp"
                autocomplete="off"
                required/>
            </div>
          </div>

          <div class="d-flex gap-2 mt-4 mb-4">
            <button class="login-btn" type="submit">Verify</button>
          </div>
        </form>
      </div>
    </div>

    {% endblock %}
  </div>
</div>
