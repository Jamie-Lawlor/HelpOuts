<div id="community-map" style="height: 400px"></div>
<!--
      The `defer` attribute causes the script to execute after the full HTML
      document has been parsed. -->
<script
  async
  src="https://maps.googleapis.com/maps/api/js?key={{GMAPS_API_KEY}}&loading=async&callback=loadCommunityMap"
  defer
></script>

<script>

    async function loadCommunityMap() {
      const communityId = {{ community_id }}
      console.log("communityId=", communityId)

      const response = await fetch(`/api/getCommunityMap/${communityId}`);
      const locationData = await response.json()
      console.log(locationData)

      
      const { Map } = await google.maps.importLibrary("maps")
      const { AdvancedMarkerElement } = await google.maps.importLibrary("marker")

      
      const map = new google.maps.Map(document.getElementById("community-map"), {
        center: { lat: locationData.lat, lng: locationData.lng },
        zoom: 15,
        mapId: "HelpOutsJobMap"
      });

      const markerIcon = document.createElement("img")
      markerIcon.src = locationData.icon_url
      markerIcon.style.width = "80px"
      markerIcon.style.height = "80px"

      let marker = new AdvancedMarkerElement({
        map: map,
        position: { lat: locationData.lat, lng: locationData.lng },
        title: locationData.name,
        content: markerIcon
      })
            
    }
</script>
