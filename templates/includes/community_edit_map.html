<div id="community-edit-map" style="height: 400px"></div>
<script>

  async function loadCommunityEditMap() {
    const communityId = {{ community_id }}
    console.log("communityId=", communityId)

    const response = await fetch(`/api/getCommunityMap/${communityId}`);
    const locationData = await response.json()
    console.log(locationData)


    const { Map } = await google.maps.importLibrary("maps")
    const { AdvancedMarkerElement } = await google.maps.importLibrary("marker")


    const map = new google.maps.Map(document.getElementById("community-edit-map"), {
      center: { lat: locationData.lat, lng: locationData.lng },
      zoom: 15,
      mapId: "HelpOutsJobMap"
    });

    const markerIcon = document.createElement("img")
    markerIcon.src = locationData.icon_url
    markerIcon.style.width = "80px"
    markerIcon.style.height = "80px"

  let marker = new AdvancedMarkerElement({
    map: map,
    position: { lat: locationData.lat, lng: locationData.lng },
    title: locationData.name,
    content: markerIcon
  })

    let firstClick = true
    let newLocationMarker
  map.addListener("click", (e) => {
      if(firstClick) {
      placeMarkerAndPanTo(e.latLng, map);
        firstClick = false
      } else {
        replaceMarkerAndPanTo(e.latLng, map)
      }

  });

  function placeMarkerAndPanTo(latLng, map) {
      newLocationMarker = new google.maps.marker.AdvancedMarkerElement({
        position: latLng,
        map: map,
      });
      map.panTo(latLng);
    }
    function replaceMarkerAndPanTo(latLng, map) {
      newLocationMarker.setMap(null)
      newLocationMarker = new google.maps.marker.AdvancedMarkerElement({
        position: latLng,
        map: map,
      });
      map.panTo(latLng);
    }
  }
  loadCommunityEditMap()
</script>
